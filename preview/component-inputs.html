<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Form — Inputs</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px 20px;">

    <div>
      <div style="font-size:12px;font-weight:500;color:#1A1A1A;margin-bottom:6px">아동 이름</div>
      <input value="박서윤" style="width:100%;height:38px;padding:0 12px;border:1px solid #C9CFCC;border-radius:6px;font-size:13px;color:#1A1A1A;font-family:var(--font-sans)" />
      <div style="font-size:11px;color:#6B7280;margin-top:5px">실명 또는 가명을 사용할 수 있습니다.</div>
    </div>

    <div>
      <div style="font-size:12px;font-weight:500;color:#1A1A1A;margin-bottom:6px">생년월일</div>
      <input value="2020.04.15" style="width:100%;height:38px;padding:0 12px;border:1.5px solid #2D6A4F;border-radius:6px;font-size:13px;color:#1A1A1A;font-family:var(--font-sans);box-shadow:0 0 0 3px rgba(45,106,79,0.20)" />
      <div style="font-size:11px;color:#2D6A4F;margin-top:5px;font-weight:500">Focused</div>
    </div>

    <div>
      <div style="font-size:12px;font-weight:500;color:#1A1A1A;margin-bottom:6px">이메일</div>
      <input value="invalid-email" style="width:100%;height:38px;padding:0 12px;border:1.5px solid #EF4444;border-radius:6px;font-size:13px;color:#1A1A1A;font-family:var(--font-sans)" />
      <div style="font-size:11px;color:#B91C1C;margin-top:5px;font-weight:500">올바른 이메일 형식이 아닙니다.</div>
    </div>

    <div>
      <div style="font-size:12px;font-weight:500;color:#1A1A1A;margin-bottom:6px">담당 치료사</div>
      <div style="position:relative">
        <input value="김지원 선임 치료사" disabled style="width:100%;height:38px;padding:0 12px;background:#F6F8F7;border:1px solid #E2E6E4;border-radius:6px;font-size:13px;color:#9AA3A0;font-family:var(--font-sans);cursor:not-allowed" />
      </div>
      <div style="font-size:11px;color:#9AA3A0;margin-top:5px">Disabled · 관리자만 변경 가능</div>
    </div>

    <div style="grid-column:1/-1">
      <div style="font-size:12px;font-weight:500;color:#1A1A1A;margin-bottom:6px">세션 메모</div>
      <textarea style="width:100%;min-height:60px;padding:10px 12px;border:1px solid #C9CFCC;border-radius:6px;font-size:13px;color:#1A1A1A;font-family:var(--font-sans);resize:vertical">오늘 세션에서는 그림 카드 활용한 어휘 확장 활동 진행. 아동의 발화 빈도가 평소보다 높았음.</textarea>
    </div>

  </div>
</div></body></html>
