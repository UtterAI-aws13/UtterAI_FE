<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Neutral — Ink scale</div>
  <div style="display:grid;grid-template-columns:repeat(11,1fr);gap:6px;">
    <div class="swatch"><div class="chip" style="background:#0B0F0D"></div><div class="name">900</div><div class="hex">0B0F0D</div></div>
    <div class="swatch"><div class="chip" style="background:#1A1A1A"></div><div class="name">800 ★</div><div class="hex">1A1A1A</div></div>
    <div class="swatch"><div class="chip" style="background:#2E3733"></div><div class="name">700</div><div class="hex">2E3733</div></div>
    <div class="swatch"><div class="chip" style="background:#4B5650"></div><div class="name">600</div><div class="hex">4B5650</div></div>
    <div class="swatch"><div class="chip" style="background:#6B7280"></div><div class="name">500 ★</div><div class="hex">6B7280</div></div>
    <div class="swatch"><div class="chip" style="background:#9AA3A0"></div><div class="name">400</div><div class="hex">9AA3A0</div></div>
    <div class="swatch"><div class="chip" style="background:#C9CFCC"></div><div class="name">300</div><div class="hex">C9CFCC</div></div>
    <div class="swatch"><div class="chip" style="background:#E2E6E4"></div><div class="name">200 ★</div><div class="hex">E2E6E4</div></div>
    <div class="swatch"><div class="chip" style="background:#EEF1EF"></div><div class="name">100</div><div class="hex">EEF1EF</div></div>
    <div class="swatch"><div class="chip" style="background:#F6F8F7"></div><div class="name">50</div><div class="hex">F6F8F7</div></div>
    <div class="swatch"><div class="chip" style="background:#FFFFFF;border:1px solid #E2E6E4"></div><div class="name">0</div><div class="hex">FFFFFF</div></div>
  </div>
  <div style="margin-top:14px;display:flex;gap:18px;font-size:11px;color:#6B7280">
    <span><b style="color:#1A1A1A">800</b> Primary text</span>
    <span><b style="color:#1A1A1A">500</b> Secondary text, captions</span>
    <span><b style="color:#1A1A1A">200</b> Borders, dividers</span>
    <span><b style="color:#1A1A1A">50</b> Hover surface</span>
  </div>
</div></body></html>
