<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Brand — Forest Green</div>
  <div style="display:grid;grid-template-columns:repeat(11,1fr);gap:6px;">
    <div class="swatch"><div class="chip" style="background:#0F2A24"></div><div class="name">900</div><div class="hex">0F2A24</div></div>
    <div class="swatch"><div class="chip" style="background:#173A33"></div><div class="name">800</div><div class="hex">173A33</div></div>
    <div class="swatch"><div class="chip" style="background:#1A3C34;outline:2px solid #1A3C34;outline-offset:-2px"></div><div class="name">700 ★</div><div class="hex">1A3C34</div></div>
    <div class="swatch"><div class="chip" style="background:#245249"></div><div class="name">600</div><div class="hex">245249</div></div>
    <div class="swatch"><div class="chip" style="background:#2D6A4F"></div><div class="name">500 ★</div><div class="hex">2D6A4F</div></div>
    <div class="swatch"><div class="chip" style="background:#4D8A6F"></div><div class="name">400</div><div class="hex">4D8A6F</div></div>
    <div class="swatch"><div class="chip" style="background:#7FB196"></div><div class="name">300</div><div class="hex">7FB196</div></div>
    <div class="swatch"><div class="chip" style="background:#B7DEC8"></div><div class="name">200 ★</div><div class="hex">B7DEC8</div></div>
    <div class="swatch"><div class="chip" style="background:#D8ECDF"></div><div class="name">100</div><div class="hex">D8ECDF</div></div>
    <div class="swatch"><div class="chip" style="background:#ECF5EF"></div><div class="name">50</div><div class="hex">ECF5EF</div></div>
    <div class="swatch"><div class="chip" style="background:#F4FAF6"></div><div class="name">25</div><div class="hex">F4FAF6</div></div>
  </div>
  <div style="margin-top:14px;display:flex;gap:18px;font-size:11px;color:#6B7280">
    <span><b style="color:#1A1A1A">700</b> Primary actions, focused states</span>
    <span><b style="color:#1A1A1A">500</b> Secondary, links, sidebar accents</span>
    <span><b style="color:#1A1A1A">200</b> Soft highlights, badges</span>
    <span><b style="color:#1A1A1A">25</b> App background</span>
  </div>
</div></body></html>
