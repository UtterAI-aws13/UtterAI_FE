<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Semantic — Status</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">

    <div>
      <div style="font-size:11px;font-weight:600;color:#1A1A1A;margin-bottom:6px">Success</div>
      <div style="display:flex;gap:4px">
        <div style="flex:1;height:44px;background:#DCFCE7;border-radius:6px 0 0 6px"></div>
        <div style="flex:1;height:44px;background:#22C55E"></div>
        <div style="flex:1;height:44px;background:#15803D;border-radius:0 6px 6px 0"></div>
      </div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6B7280;margin-top:6px;line-height:1.5">100 · DCFCE7<br>500 · 22C55E<br>700 · 15803D</div>
    </div>

    <div>
      <div style="font-size:11px;font-weight:600;color:#1A1A1A;margin-bottom:6px">Warning</div>
      <div style="display:flex;gap:4px">
        <div style="flex:1;height:44px;background:#FEF3C7;border-radius:6px 0 0 6px"></div>
        <div style="flex:1;height:44px;background:#F59E0B"></div>
        <div style="flex:1;height:44px;background:#B45309;border-radius:0 6px 6px 0"></div>
      </div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6B7280;margin-top:6px;line-height:1.5">100 · FEF3C7<br>500 · F59E0B<br>700 · B45309</div>
    </div>

    <div>
      <div style="font-size:11px;font-weight:600;color:#1A1A1A;margin-bottom:6px">Danger</div>
      <div style="display:flex;gap:4px">
        <div style="flex:1;height:44px;background:#FEE2E2;border-radius:6px 0 0 6px"></div>
        <div style="flex:1;height:44px;background:#EF4444"></div>
        <div style="flex:1;height:44px;background:#B91C1C;border-radius:0 6px 6px 0"></div>
      </div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6B7280;margin-top:6px;line-height:1.5">100 · FEE2E2<br>500 · EF4444<br>700 · B91C1C</div>
    </div>

    <div>
      <div style="font-size:11px;font-weight:600;color:#1A1A1A;margin-bottom:6px">Info</div>
      <div style="display:flex;gap:4px">
        <div style="flex:1;height:44px;background:#DBEAFE;border-radius:6px 0 0 6px"></div>
        <div style="flex:1;height:44px;background:#3B82F6"></div>
        <div style="flex:1;height:44px;background:#1D4ED8;border-radius:0 6px 6px 0"></div>
      </div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6B7280;margin-top:6px;line-height:1.5">100 · DBEAFE<br>500 · 3B82F6<br>700 · 1D4ED8</div>
    </div>

  </div>
</div></body></html>
