<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="background:#F4FAF6">
  <div class="eyebrow">Elevation — Shadow</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;">
    <div style="text-align:center">
      <div style="height:80px;background:#fff;border-radius:10px;box-shadow:0 1px 2px rgba(15,42,36,0.04)"></div>
      <div style="margin-top:8px;font-size:11px;font-weight:600;color:#1A1A1A">xs</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">flat chips</div>
    </div>
    <div style="text-align:center">
      <div style="height:80px;background:#fff;border-radius:10px;box-shadow:0 1px 2px rgba(15,42,36,0.04), 0 1px 3px rgba(15,42,36,0.06)"></div>
      <div style="margin-top:8px;font-size:11px;font-weight:600;color:#1A1A1A">sm · default card</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">primary use</div>
    </div>
    <div style="text-align:center">
      <div style="height:80px;background:#fff;border-radius:10px;box-shadow:0 4px 8px -2px rgba(15,42,36,0.06), 0 2px 4px -2px rgba(15,42,36,0.04)"></div>
      <div style="margin-top:8px;font-size:11px;font-weight:600;color:#1A1A1A">md · dropdown</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">menus, popovers</div>
    </div>
    <div style="text-align:center">
      <div style="height:80px;background:#fff;border-radius:10px;box-shadow:0 12px 24px -8px rgba(15,42,36,0.10), 0 4px 8px -4px rgba(15,42,36,0.06)"></div>
      <div style="margin-top:8px;font-size:11px;font-weight:600;color:#1A1A1A">lg · toast</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">floating ui</div>
    </div>
    <div style="text-align:center">
      <div style="height:80px;background:#fff;border-radius:10px;box-shadow:0 24px 48px -12px rgba(15,42,36,0.18)"></div>
      <div style="margin-top:8px;font-size:11px;font-weight:600;color:#1A1A1A">xl · modal</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">overlays</div>
    </div>
  </div>
</div></body></html>
