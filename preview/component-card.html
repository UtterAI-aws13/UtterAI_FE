<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="background:#F4FAF6">
  <div class="eyebrow">Card · Default</div>
  <div style="background:#fff;border:1px solid #E2E6E4;border-radius:12px;box-shadow:0 1px 2px rgba(15,42,36,0.04),0 1px 3px rgba(15,42,36,0.06);overflow:hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #EEF1EF">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;border-radius:8px;background:#D8ECDF;display:flex;align-items:center;justify-content:center;color:#1A3C34;font-weight:700;font-size:13px;font-family:var(--font-sans)">박</div>
        <div>
          <div style="font-size:14px;font-weight:600;color:#1A1A1A">박서윤 · 6세 2개월</div>
          <div style="font-size:11px;color:#6B7280;margin-top:1px">세션 #024 · 2026.05.28 14:00</div>
        </div>
      </div>
      <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:#DCFCE7;color:#15803D;font-size:11px;font-weight:600"><span style="width:6px;height:6px;border-radius:999px;background:#22C55E"></span>ANALYSIS_COMPLETED</span>
    </div>
    <div style="padding:14px 18px">
      <div style="font-size:13px;color:#2E3733;line-height:1.55">평균 발화 길이(MLU) <b style="color:#1A3C34;font-family:var(--font-mono)">4.27</b>, 어휘 다양도(TTR) <b style="color:#1A3C34;font-family:var(--font-mono)">0.62</b>. 또래 평균 범위에서 안정적 발달을 보입니다.</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;padding:10px 14px;background:#F6F8F7;border-top:1px solid #EEF1EF">
      <button style="background:transparent;border:none;color:#2D6A4F;font-weight:600;font-size:12px;padding:6px 12px;border-radius:999px;cursor:pointer;font-family:var(--font-sans)">SOAP Note</button>
      <button style="background:#1A3C34;color:#fff;border:none;font-weight:600;font-size:12px;padding:7px 14px;border-radius:999px;cursor:pointer;font-family:var(--font-sans)">리포트 열기</button>
    </div>
  </div>
</div></body></html>
