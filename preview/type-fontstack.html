<!-- @dsCard group="Type" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Font Stack</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">

    <div style="padding:16px;border:1px solid #E2E6E4;border-radius:10px">
      <div style="font-family:'Noto Sans KR';font-size:36px;font-weight:700;color:#1A3C34;line-height:1.1">Noto Sans KR</div>
      <div style="font-family:'Noto Sans KR';font-size:22px;font-weight:400;color:#1A1A1A;margin-top:4px">언어 치료 분석 플랫폼</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6B7280;margin-top:10px">Primary · 300 / 400 / 500 / 600 / 700 / 800</div>
      <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
        <span style="font-family:'Noto Sans KR';font-weight:300;font-size:13px;color:#1A1A1A">가나다 Aa</span>
        <span style="font-family:'Noto Sans KR';font-weight:400;font-size:13px;color:#1A1A1A">가나다 Aa</span>
        <span style="font-family:'Noto Sans KR';font-weight:500;font-size:13px;color:#1A1A1A">가나다 Aa</span>
        <span style="font-family:'Noto Sans KR';font-weight:700;font-size:13px;color:#1A1A1A">가나다 Aa</span>
        <span style="font-family:'Noto Sans KR';font-weight:800;font-size:13px;color:#1A1A1A">가나다 Aa</span>
      </div>
    </div>

    <div style="padding:16px;border:1px solid #E2E6E4;border-radius:10px">
      <div style="font-family:'Inter';font-size:36px;font-weight:700;color:#1A3C34;line-height:1.1">Inter</div>
      <div style="font-family:'Inter';font-size:22px;font-weight:400;color:#1A1A1A;margin-top:4px">UtterAI · MLU 4.2</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:#6B7280;margin-top:10px">Latin fallback · 400 / 500 / 600 / 700</div>
      <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
        <span style="font-family:'Inter';font-weight:400;font-size:13px">Aa Rr 0–9</span>
        <span style="font-family:'Inter';font-weight:500;font-size:13px">Aa Rr 0–9</span>
        <span style="font-family:'Inter';font-weight:600;font-size:13px">Aa Rr 0–9</span>
        <span style="font-family:'Inter';font-weight:700;font-size:13px">Aa Rr 0–9</span>
      </div>
    </div>

  </div>
  <div style="margin-top:12px;font-size:11px;color:#6B7280">한글 문자는 Noto Sans KR이, 라틴 문자·숫자는 자동으로 Inter가 렌더링됩니다 (font stack fallback).</div>
</div></body></html>
