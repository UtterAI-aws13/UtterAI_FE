      <div style="font-family:'JetBrains Mono', monospace;font-size:36px;font-weight:500;color:#1A3C34;font-variant-numeric:tabular-nums;line-height:1.1;margin-top:4px">0.62</div>

  </div>
  <div style="margin-top:12px;display:flex;gap:18px;font-size:11px;color:#6B7280">

  </div>
