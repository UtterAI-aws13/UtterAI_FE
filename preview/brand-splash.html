<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="padding:0;width:700px;height:240px;overflow:hidden;border-radius:12px;background:#1A3C34;position:relative">
  <!-- Organic green blobs / abstract -->
  <svg style="position:absolute;inset:0;width:100%;height:100%" viewBox="0 0 700 240" preserveAspectRatio="none">
    <defs>
      <radialGradient id="g1" cx="20%" cy="40%" r="60%"><stop offset="0%" stop-color="#2D6A4F" stop-opacity=".9"/><stop offset="100%" stop-color="#1A3C34" stop-opacity="0"/></radialGradient>
      <radialGradient id="g2" cx="80%" cy="80%" r="50%"><stop offset="0%" stop-color="#4D8A6F" stop-opacity=".55"/><stop offset="100%" stop-color="#1A3C34" stop-opacity="0"/></radialGradient>
    </defs>
    <rect width="700" height="240" fill="url(#g1)"/>
    <rect width="700" height="240" fill="url(#g2)"/>
    <!-- waveform line -->
    <g stroke="#B7DEC8" stroke-width="2" stroke-linecap="round" opacity=".5">
      <line x1="40" y1="120" x2="40" y2="120"/>
      <line x1="60" y1="105" x2="60" y2="135"/>
      <line x1="80" y1="80" x2="80" y2="160"/>
      <line x1="100" y1="95" x2="100" y2="145"/>
      <line x1="120" y1="115" x2="120" y2="125"/>
      <line x1="140" y1="70" x2="140" y2="170"/>
      <line x1="160" y1="100" x2="160" y2="140"/>
      <line x1="180" y1="85" x2="180" y2="155"/>
      <line x1="200" y1="110" x2="200" y2="130"/>
      <line x1="220" y1="50" x2="220" y2="190"/>
      <line x1="240" y1="90" x2="240" y2="150"/>
      <line x1="260" y1="115" x2="260" y2="125"/>
      <line x1="280" y1="75" x2="280" y2="165"/>
      <line x1="300" y1="105" x2="300" y2="135"/>
      <line x1="320" y1="120" x2="320" y2="120"/>
    </g>
    <!-- subtle dotted -->
    <circle cx="600" cy="60" r="3" fill="#B7DEC8" opacity=".6"/>
    <circle cx="630" cy="180" r="2" fill="#B7DEC8" opacity=".5"/>
    <circle cx="540" cy="200" r="2" fill="#B7DEC8" opacity=".5"/>
  </svg>
  <div style="position:relative;padding:36px 40px;height:100%;display:flex;flex-direction:column;justify-content:center">
    <img src="../assets/logo-wordmark-mono.svg" style="height:36px;width:auto;align-self:flex-start"/>
    <div style="margin-top:18px;font-size:24px;font-weight:700;color:#fff;letter-spacing:-0.01em;max-width:440px;line-height:1.3">AI로 더 깊이 듣는<br/>아동 언어 치료</div>
    <div style="margin-top:8px;font-size:13px;color:#B7DEC8;max-width:440px;line-height:1.55">세션을 녹음하면 전사·언어 지표·SOAP Note를 자동으로 정리해드립니다.</div>
  </div>
</div></body></html>
