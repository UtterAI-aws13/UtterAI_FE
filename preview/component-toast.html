<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="background:#F4FAF6">
  <div class="eyebrow">Toast Notifications</div>
  <div style="display:flex;flex-direction:column;gap:10px">

    <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:#fff;border-radius:12px;box-shadow:0 12px 24px -8px rgba(15,42,36,0.10), 0 4px 8px -4px rgba(15,42,36,0.06);border:1px solid #DCFCE7">
      <div style="width:24px;height:24px;border-radius:999px;background:#DCFCE7;color:#15803D;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:#1A1A1A">분석이 완료되었습니다</div>
        <div style="font-size:12px;color:#6B7280;margin-top:2px">박서윤 세션 #024의 리포트를 확인할 수 있습니다.</div>
      </div>
      <button style="background:transparent;border:none;color:#6B7280;cursor:pointer;padding:2px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>

    <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:#fff;border-radius:12px;box-shadow:0 12px 24px -8px rgba(15,42,36,0.10), 0 4px 8px -4px rgba(15,42,36,0.06);border:1px solid #FEE2E2">
      <div style="width:24px;height:24px;border-radius:999px;background:#FEE2E2;color:#B91C1C;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:#1A1A1A">업로드 실패</div>
        <div style="font-size:12px;color:#6B7280;margin-top:2px">파일 형식이 지원되지 않습니다. WAV, MP3, M4A만 가능합니다.</div>
      </div>
      <button style="background:transparent;border:none;color:#6B7280;cursor:pointer;padding:2px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>

    <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:#fff;border-radius:12px;box-shadow:0 12px 24px -8px rgba(15,42,36,0.10), 0 4px 8px -4px rgba(15,42,36,0.06);border:1px solid #DBEAFE">
      <div style="width:24px;height:24px;border-radius:999px;background:#DBEAFE;color:#1D4ED8;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:#1A1A1A">자동 저장됨</div>
        <div style="font-size:12px;color:#6B7280;margin-top:2px">SOAP Note 초안이 14:32에 저장되었습니다.</div>
      </div>
    </div>

  </div>
</div></body></html>
