<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Speaker Roles — Transcript</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
    <div style="padding:14px;border:1px solid #E2E6E4;border-radius:10px;background:#fff">
      <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:#D8ECDF;color:#1A3C34;font-size:11px;font-weight:600">
        <span style="width:6px;height:6px;border-radius:999px;background:#2D6A4F"></span>아동 · CHILD
      </span>
      <div style="margin-top:10px;font-size:12px;color:#2E3733;line-height:1.5">오늘은 어린이집에서 친구랑 놀았어요.</div>
    </div>
    <div style="padding:14px;border:1px solid #E2E6E4;border-radius:10px;background:#fff">
      <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:#DBEAFE;color:#1D4ED8;font-size:11px;font-weight:600">
        <span style="width:6px;height:6px;border-radius:999px;background:#3B82F6"></span>치료사 · THERAPIST
      </span>
      <div style="margin-top:10px;font-size:12px;color:#2E3733;line-height:1.5">어떤 친구랑 놀았는지 얘기해줄래요?</div>
    </div>
    <div style="padding:14px;border:1px solid #E2E6E4;border-radius:10px;background:#fff">
      <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;background:#EEF1EF;color:#4B5650;font-size:11px;font-weight:600">
        <span style="width:6px;height:6px;border-radius:999px;background:#9AA3A0"></span>미상 · UNKNOWN
      </span>
      <div style="margin-top:10px;font-size:12px;color:#2E3733;line-height:1.5">(배경음 · 식별 불가)</div>
    </div>
  </div>
</div></body></html>
