<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Stepper — Multi-step Flow</div>
  <div style="display:flex;align-items:center;gap:0;padding:8px 0">
    <!-- 1 done -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;min-width:90px">
      <div style="width:28px;height:28px;border-radius:999px;background:#1A3C34;color:#fff;display:flex;align-items:center;justify-content:center">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="font-size:11px;font-weight:600;color:#1A1A1A">업로드</div>
    </div>
    <div style="flex:1;height:2px;background:#1A3C34;margin-bottom:18px"></div>

    <!-- 2 active -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;min-width:90px">
      <div style="width:28px;height:28px;border-radius:999px;background:#fff;border:2px solid #1A3C34;color:#1A3C34;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;box-shadow:0 0 0 4px rgba(26,60,52,0.12)">2</div>
      <div style="font-size:11px;font-weight:600;color:#1A1A1A">분석</div>
    </div>
    <div style="flex:1;height:2px;background:#E2E6E4;margin-bottom:18px"></div>

    <!-- 3 -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;min-width:90px">
      <div style="width:28px;height:28px;border-radius:999px;background:#fff;border:1.5px solid #C9CFCC;color:#9AA3A0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600">3</div>
      <div style="font-size:11px;font-weight:500;color:#6B7280">검토</div>
    </div>
    <div style="flex:1;height:2px;background:#E2E6E4;margin-bottom:18px"></div>

    <!-- 4 -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;min-width:90px">
      <div style="width:28px;height:28px;border-radius:999px;background:#fff;border:1.5px solid #C9CFCC;color:#9AA3A0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600">4</div>
      <div style="font-size:11px;font-weight:500;color:#6B7280">리포트</div>
    </div>
  </div>

  <div style="margin-top:14px;padding:12px 14px;background:#ECF5EF;border-radius:10px;display:flex;align-items:center;gap:12px">
    <div style="position:relative;width:32px;height:32px;flex-shrink:0">
      <svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" stroke="#D8ECDF" stroke-width="3" fill="none"/><circle cx="16" cy="16" r="13" stroke="#2D6A4F" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="81.68" stroke-dashoffset="32" transform="rotate(-90 16 16)"/></svg>
    </div>
    <div style="flex:1">
      <div style="font-size:12px;font-weight:600;color:#1A1A1A">음성 분석 중 · 화자 분리 (3/5)</div>
      <div style="font-size:11px;color:#6B7280;margin-top:1px">예상 소요 시간 약 2분</div>
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:#1A3C34;font-variant-numeric:tabular-nums">61%</div>
  </div>
</div></body></html>
