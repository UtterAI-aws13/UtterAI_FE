<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card" style="background:#F4FAF6;padding:0;width:700px;height:380px;overflow:hidden;position:relative">
  <!-- App canvas peek -->
  <div style="position:absolute;inset:0;background:#F4FAF6;padding:20px">
    <div style="height:30px;background:#fff;border-radius:8px;width:60%;opacity:.5"></div>
    <div style="margin-top:12px;height:120px;background:#fff;border-radius:10px;opacity:.5"></div>
  </div>
  <!-- Backdrop -->
  <div style="position:absolute;inset:0;background:rgba(15,42,36,0.45);backdrop-filter:blur(2px)"></div>

  <!-- Modal -->
  <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:440px;background:#fff;border-radius:16px;box-shadow:0 24px 48px -12px rgba(15,42,36,0.18);overflow:hidden">
    <div style="padding:20px 22px 4px">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div style="width:36px;height:36px;border-radius:10px;background:#FEE2E2;color:#B91C1C;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:700;color:#1A1A1A">세션을 영구 삭제하시겠습니까?</div>
          <div style="font-size:13px;color:#6B7280;margin-top:6px;line-height:1.55">박서윤 · 세션 <span style="font-family:var(--font-mono);color:#1A1A1A">#024</span>의 전사, 분석 결과, 리포트가 모두 삭제됩니다. 이 작업은 되돌릴 수 없습니다.</div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;padding:16px 18px;background:#F6F8F7;border-top:1px solid #EEF1EF;margin-top:18px">
      <button style="background:#fff;color:#1A3C34;border:1px solid #1A3C34;font-weight:600;font-size:13px;padding:8px 16px;border-radius:999px;cursor:pointer;font-family:var(--font-sans)">취소</button>
      <button style="background:#EF4444;color:#fff;border:none;font-weight:600;font-size:13px;padding:9px 18px;border-radius:999px;cursor:pointer;font-family:var(--font-sans)">영구 삭제</button>
    </div>
  </div>
</div></body></html>
