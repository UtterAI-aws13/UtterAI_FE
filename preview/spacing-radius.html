<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow">Radius</div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;align-items:end;">
    <div style="text-align:center"><div style="height:60px;background:#B7DEC8;border-radius:4px;border:1px solid #2D6A4F"></div><div style="margin-top:6px;font-size:10px;color:#1A1A1A;font-weight:600">xs</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">4</div></div>
    <div style="text-align:center"><div style="height:60px;background:#B7DEC8;border-radius:6px;border:1px solid #2D6A4F"></div><div style="margin-top:6px;font-size:10px;color:#1A1A1A;font-weight:600">sm · input</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">6</div></div>
    <div style="text-align:center"><div style="height:60px;background:#B7DEC8;border-radius:8px;border:1px solid #2D6A4F"></div><div style="margin-top:6px;font-size:10px;color:#1A1A1A;font-weight:600">md · chip</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">8</div></div>
    <div style="text-align:center"><div style="height:60px;background:#B7DEC8;border-radius:12px;border:1px solid #2D6A4F"></div><div style="margin-top:6px;font-size:10px;color:#1A1A1A;font-weight:600">lg · card</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">12</div></div>
    <div style="text-align:center"><div style="height:60px;background:#B7DEC8;border-radius:16px;border:1px solid #2D6A4F"></div><div style="margin-top:6px;font-size:10px;color:#1A1A1A;font-weight:600">xl · modal</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">16</div></div>
    <div style="text-align:center"><div style="height:60px;background:#B7DEC8;border-radius:20px;border:1px solid #2D6A4F"></div><div style="margin-top:6px;font-size:10px;color:#1A1A1A;font-weight:600">2xl</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">20</div></div>
    <div style="text-align:center"><div style="height:60px;background:#B7DEC8;border-radius:999px;border:1px solid #2D6A4F"></div><div style="margin-top:6px;font-size:10px;color:#1A1A1A;font-weight:600">pill · btn</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B7280">999</div></div>
  </div>
</div></body></html>
