    </div>

    <div style="display:flex;gap:14px;padding:10px 12px;border-radius:8px;background:#fff;border:1.5px solid #2D6A4F;box-shadow:0 0 0 3px rgba(45,106,79,0.12)">

      <span style="display:inline-flex;align-items:center;height:22px;gap:5px;padding:0 9px;border-radius:999px;background:#D8ECDF;color:#1A3C34;font-size:11px;font-weight:600;align-self:flex-start;margin-top:1px"><span style="width:5px;height:5px;border-radius:999px;background:#2D6A4F"></span>아동</span>

      <span style="display:inline-flex;align-items:center;height:22px;gap:5px;padding:0 9px;border-radius:999px;background:#EEF1EF;color:#4B5650;font-size:11px;font-weight:600;align-self:flex-start;margin-top:1px"><span style="width:5px;height:5px;border-radius:999px;background:#9AA3A0"></span>미상</span>
